<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#EDEAE4"/>

  <!-- Card with punched holes -->
  <defs>
    <mask id="card-mask">
      <rect x="140" y="35" width="920" height="560" rx="40" fill="white"/>
      <circle cx="192" cy="87"  r="30" fill="black"/>
      <circle cx="1008" cy="87"  r="30" fill="black"/>
      <circle cx="192" cy="543" r="30" fill="black"/>
      <circle cx="1008" cy="543" r="30" fill="black"/>
    </mask>
  </defs>
  <rect x="140" y="35" width="920" height="560" rx="40" fill="#FFE783" mask="url(#card-mask)"/>

  <!-- "Hello" label -->
  <text x="600" y="130"
        text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="400" fill="#000000">Hello</text>

  <!-- Star (80×80, centered at 600, ~198) -->
  <g transform="translate(560, 158) scale(2)">
    <polygon points="20,1 24.4,13.9 38.1,14.1 27.1,22.3 31.2,35.4 20,27.5 8.8,35.4 12.9,22.3 1.9,14.1 15.6,13.9" fill="#000000"/>
  </g>

  <!-- Main heading -->
  <text x="600" y="332"
        text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="#000000">Anthea's website is</text>
  <text x="600" y="410"
        text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="#000000">under [re]construction</text>

  <!-- Subtitle -->
  <text x="600" y="460"
        text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="400" fill="#1A1A1A">but you can still take a peek!</text>

  <!-- Footer -->
  <text x="600" y="548"
        text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="400" fill="#000000">Will be back March 31</text>
</svg>
